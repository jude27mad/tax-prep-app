name: CI
on:
  push: { branches: [ main ] }
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements-ci.txt

      - run: ruff check .
      - run: mypy app

      - name: Alembic migrations round-trip (D1.3 — persistent document vault)
        env:
          DATABASE_URL: sqlite+aiosqlite:///${{ runner.temp }}/ci-migration-check.db
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run tests (non-Playwright)
        run: pytest -q -p no:pytest_playwright -m "not playwright_smoke"

      - run: python -m playwright install chromium

      - name: Run tests (Playwright)
        run: pytest -q -p pytest_playwright -m playwright_smoke

      - run: python -m app.main --data tests/fixtures/user_data.toml --profile sample --quick --color never --no-save

  cert-rehearsal:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements-ci.txt

      - name: Run CERT rehearsal bundle
        env:
          EFILE_ENV: CERT
          FEATURE_EFILE_XML: "1"
          EFILE_WINDOW_OPEN: "1"
        run: python scripts/cert_rehearsal.py --bundle-root cert_bundle
