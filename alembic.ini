# Alembic config for the persistent document vault (D1.3).
#
# The actual database URL is resolved at runtime by migrations/env.py from
# app.config.Settings + app.db.build_database_url, so ``sqlalchemy.url`` here
# is only a placeholder for tools that demand a value. Operators override
# the URL at the CLI via ``alembic -x url=...`` if they need to target a
# non-default database.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url = sqlite+aiosqlite:///tax_app.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
